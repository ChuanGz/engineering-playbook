<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">Capability composition model</title>
  <desc id="description">Knowledge, skills, and experience combine into capability. Mindset influences every stage, practice strengthens the inputs, and consistent application of capability produces measurable impact.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="capability" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .white-label { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .white-body { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#canvas)"/>

  <rect x="70" y="52" width="1060" height="72" rx="20" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  <circle cx="112" cy="88" r="17" fill="#e0e7ff"/>
  <path d="M104 88h16M112 80v16" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <text x="145" y="84" class="label">Mindset shapes every stage</text>
  <text x="145" y="108" class="body">Decisions · learning · behavior</text>

  <path d="M238 292 C238 340 390 350 496 382" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M600 292 L600 363" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M962 292 C962 340 810 350 704 382" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="174" width="296" height="118" rx="22" fill="#ffffff"/>
    <rect x="452" y="174" width="296" height="118" rx="22" fill="#ffffff"/>
    <rect x="814" y="174" width="296" height="118" rx="22" fill="#ffffff"/>
  </g>
  <circle cx="132" cy="216" r="18" fill="#dbeafe"/>
  <path d="M124 211h16M124 217h12M124 223h9" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"/>
  <text x="164" y="217" class="label">Knowledge</text>
  <text x="122" y="258" class="body">What an engineer understands</text>

  <circle cx="494" cy="216" r="18" fill="#dcfce7"/>
  <path d="M485 218l6 6 12-15" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="526" y="217" class="label">Skills</text>
  <text x="484" y="258" class="body">Ability to apply knowledge</text>

  <circle cx="856" cy="216" r="18" fill="#fef3c7"/>
  <path d="M856 207v10l7 4" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <text x="888" y="217" class="label">Experience</text>
  <text x="846" y="252" class="body">Judgment built through repeated</text>
  <text x="846" y="274" class="body">real-world application</text>

  <g filter="url(#shadow)">
    <rect x="426" y="370" width="348" height="132" rx="32" fill="url(#capability)"/>
  </g>
  <text x="600" y="425" text-anchor="middle" class="white-label">Capability</text>
  <text x="600" y="458" text-anchor="middle" class="white-body">The combined ability to produce</text>
  <text x="600" y="481" text-anchor="middle" class="white-body">a useful outcome</text>

  <path d="M600 502 L600 568" fill="none" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="624" y="542" class="small">consistent application</text>

  <g filter="url(#shadow)">
    <rect x="426" y="576" width="348" height="112" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  </g>
  <text x="600" y="624" text-anchor="middle" class="label">Impact</text>
  <text x="600" y="655" text-anchor="middle" class="body">A measurable outcome</text>

  <path d="M405 648 C220 648 155 556 155 435 C155 372 174 331 206 306" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="7 8" marker-end="url(#arrow)"/>
  <rect x="90" y="430" width="210" height="76" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="195" y="461" text-anchor="middle" class="label">Practice</text>
  <text x="195" y="487" text-anchor="middle" class="small">Apply · receive feedback · reflect</text>
  <text x="109" y="546" class="small">continuously strengthens</text>
  <text x="109" y="568" class="small">knowledge, skills, and experience</text>
</svg>
